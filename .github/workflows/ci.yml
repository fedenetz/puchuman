name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm test
      - run: npm run build
        env:
          SITE_URL: https://example.invalid
      - run: npm run test:e2e
        env:
          SITE_URL: https://example.invalid
      - run: npm run check:links
        env:
          SITE_URL: https://example.invalid
